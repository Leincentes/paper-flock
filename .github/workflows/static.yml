name: Test, qualify, deploy, and audit Paper Flock

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: write
  security-events: write

concurrency:
  group: paper-flock-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-quality:
    runs-on: ubuntu-latest
    outputs:
      provenance_created: ${{ steps.provenance-status.outputs.created }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Confirm public npm registry policy
        run: |
          test "$(npm config get registry)" = "https://registry.npmjs.org/"
          ! grep -R "openai.org" \
            package-lock.json .npmrc

      - name: Install locked development quality tools
        run: npm ci --no-audit --no-fund

      - name: Audit installed dependencies
        run: npm audit --audit-level=high

      - name: Run automated unit and domain tests
        run: npm test

      - name: Check JavaScript and tooling syntax
        run: npm run check

      - name: Audit package, manifest, and offline assets
        run: npm run audit:package

      - name: Audit accessibility and security hardening
        run: npm run audit:hardening

      - name: Audit software supply chain
        run: npm run audit:supply-chain

      - name: Build deterministic release directory
        run: npm run build

      - name: Verify release hashes and size budgets
        run: npm run audit:release

      - name: Generate CycloneDX dependency SBOM
        run: |
          mkdir -p release-bundle
          npm sbom --sbom-format=cyclonedx --package-lock-only \
            > release-bundle/sbom.cdx.json
          ! grep -R "openai.org" \
            release-bundle/sbom.cdx.json

      - name: Create deterministic release archive
        run: python3 tools/package-release.py

      - name: Attest release archive and SBOM
        id: provenance
        if: github.event_name != 'pull_request' && github.event.repository.private == false
        uses: actions/attest@v4
        with:
          subject-path: release-bundle/paper-flock-v1.4.4-release.zip
          sbom-path: release-bundle/sbom.cdx.json

      - name: Record attestation status
        id: provenance-status
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.provenance.outcome }}" == "success" ]]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload provenance-ready release bundle
        uses: actions/upload-artifact@v5
        with:
          name: paper-flock-v1.4.4-release-bundle
          path: release-bundle
          if-no-files-found: error
          retention-days: 30

      - name: Upload candidate release
        uses: actions/upload-artifact@v5
        with:
          name: paper-flock-release-candidate
          path: dist
          if-no-files-found: error

  browser-quality:
    runs-on: ubuntu-latest
    needs: static-quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install quality tools
        run: npm ci --no-audit --no-fund

      - name: Build release directory
        run: npm run build

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Run Chromium and WebKit browser tests
        run: npm run test:e2e

      - name: Run Lighthouse budgets
        run: npm run test:lighthouse

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: paper-flock-browser-quality
          path: |
            playwright-report
            test-results
            lighthouse-report
          if-no-files-found: ignore

  codeql-quality:
    name: CodeQL JavaScript and workflow analysis
    runs-on: ubuntu-latest
    needs: static-quality
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [static-quality, browser-quality, codeql-quality]
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download qualified release
        uses: actions/download-artifact@v6
        with:
          name: paper-flock-release-candidate
          path: _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  post-deployment-audit:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Audit deployed HTTPS app
        run: |
          node tools/audit-deployment.mjs \
            "${{ needs.deploy.outputs.page_url }}" \
            --retries=8 \
            --delay=4000

  release-evidence:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - static-quality
      - browser-quality
      - codeql-quality
      - deploy
      - post-deployment-audit
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install locked development tools
        run: npm ci --no-audit --no-fund

      - name: Download release bundle
        uses: actions/download-artifact@v5
        with:
          name: paper-flock-v1.4.4-release-bundle
          path: release-bundle

      - name: Generate importable CI evidence from completed jobs
        run: |
          node tools/create-quality-evidence.mjs \
            --unit-tests=${{ needs.static-quality.result == 'success' }} \
            --package-audit=${{ needs.static-quality.result == 'success' }} \
            --dependency-audit=${{ needs.static-quality.result == 'success' }} \
            --release-audit=${{ needs.static-quality.result == 'success' }} \
            --browser-tests=${{ needs.browser-quality.result == 'success' }} \
            --lighthouse=${{ needs.browser-quality.result == 'success' }} \
            --codeql=${{ needs.codeql-quality.result == 'success' }} \
            --deployment-audit=${{ needs.post-deployment-audit.result == 'success' }} \
            --sbom=${{ needs.static-quality.result == 'success' }} \
            --provenance=${{ needs.static-quality.outputs.provenance_created }} \
            --output=paper-flock-v1.4.4-quality-evidence.json

      - name: Upload quality evidence
        uses: actions/upload-artifact@v5
        with:
          name: paper-flock-v1.4.4-quality-evidence
          path: paper-flock-v1.4.4-quality-evidence.json
          if-no-files-found: error
          retention-days: 90
