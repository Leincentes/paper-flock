<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paper Flock v0.6 Visual Preview</title>
<link rel="stylesheet" href="./styles.css">
<style>
@page { size: 390px 844px; margin: 0; }
html, body { width: 390px; min-height: 844px; }
body { overflow: hidden; }
.app-shell { width: 390px; min-height: 844px; padding: 14px 10px; }
.prototype-tools { display:none; }
.game-card { padding: 12px; }
.hero { margin-bottom: 8px; }
.board { --board-size: 4; }
.cell { min-height: 0; }
</style>

<header class="hero">
  <div class="brand-lockup">
    <svg class="brand-crane" viewBox="0 0 96 72" aria-hidden="true">
      <path d="M9 46 38 30 49 8 58 31 87 20 68 48 48 63 28 49Z"></path>
      <path d="M38 30 58 31 48 63M28 49 49 8 68 48"></path>
    </svg>
    <div>
      <h1>Paper Flock</h1>
      <p>Find the path. Turn the flock. Let the sky unfold.</p>
    </div>
  </div>
</header>
